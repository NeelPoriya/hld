      - CockroachDB: 01-relational-databases/cockroachdb.md
  - Key-Value:
      - Redis: 02-key-value-stores/redis.md
      - DynamoDB: 02-key-value-stores/dynamodb.md
      - Memcached: 02-key-value-stores/memcached.md
      - etcd: 02-key-value-stores/etcd.md
  - Wide-Column:
      - Cassandra: 03-wide-column-stores/cassandra.md
      - HBase: 03-wide-column-stores/hbase.md
      - Bigtable: 03-wide-column-stores/bigtable.md
      - ScyllaDB: 03-wide-column-stores/scylladb.md
  - Document:
      - MongoDB: 04-document-stores/mongodb.md
  - Search:
      - ElasticSearch: 06-search-and-indexing/elasticsearch.md
  - Streaming & Queues:
      - Kafka: 09-message-queues-and-streaming/kafka.md
  - Stream Processing:
      - Flink: 10-stream-processing/flink.md
  - Batch & Big Data:
      - Hadoop: 11-batch-big-data/hadoop.md
      - Spark: 11-batch-big-data/spark.md
  - Data Warehousing:
      - Snowflake: 12-data-warehousing/snowflake.md
  - Coordination:
